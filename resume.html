<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Resume</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f8fc;
}

/* Navbar */

header{
    background:#07152d;
    padding:15px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#fff;
    font-size:30px;
    font-weight:bold;
}

.logo span{
    color:#2d7eff;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
    transition:.3s;
}

nav ul li a:hover{
    color:#2d7eff;
}

/* Resume */

.resume{
    padding:60px;
    text-align:center;
}

.resume h1{
    font-size:42px;
    color:#07152d;
}

.line{
    width:70px;
    height:4px;
    background:#2d7eff;
    margin:15px auto 30px;
}

.resume p{
    font-size:18px;
    color:#555;
    margin-bottom:30px;
}

.resume-box{
    width:90%;
    max-width:900px;
    height:900px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.resume-box iframe{
    width:100%;
    height:100%;
    border:none;
}

.buttons{
    margin-top:30px;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 30px;
    background:#2d7eff;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    transition:.3s;
}

.btn:hover{
    background:#155dd8;
}

@media(max-width:768px){

header{
    flex-direction:column;
    gap:15px;
    padding:20px;
}

nav ul{
    flex-wrap:wrap;
    justify-content:center;
}

.resume{
    padding:30px 15px;
}

.resume-box{
    width:100%;
    height:600px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
Dewmini <span>Shalika</span>
</div>

<nav>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="index.html#about">About</a></li>
<li><a href="Skill.html">Skills</a></li>
<li><a href="project.html">Projects</a></li>
<li><a href="resume.html">Resume</a></li>
<li><a href="index.html#contact">Contact</a></li>

</ul>

</nav>

</header>

<section class="resume">

<h1>My Resume</h1>

<div class="line"></div>

<p>
You can view my resume below or download it for more details.
</p>

<div class="resume-box">

<iframe src="dewmini shalika kuruppu new.pdf"></iframe>

</div>

<div class="buttons">

<a href="dewmini shalika kuruppu new.pdf" class="btn" target="_blank">
<i class="fa-solid fa-eye"></i>
 View Full Resume
</a>

<a href="dewmini shalika kuruppu new.pdf" download class="btn">
<i class="fa-solid fa-download"></i>
 Download CV
</a>

</div>

</section>

</body>
</html>
